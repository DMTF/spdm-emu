name: TPM CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  TPM2TOOLS_TCTI: swtpm:port=2321

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive
      
      - name: Install requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y tpm2-openssl tpm2-tools \
            swtpm swtpm-tools libtss2-dev

      - name: Build
        run: |
          cmake -B build \
            -DTOOLCHAIN=GCC \
            -DCRYPTO=openssl \
            -DARCH=x64 -DTARGET=Debug \
            -DDEVICE=tpm
          
          cmake --build build -j`nproc`
      
      - name: Setup software tpm 
        run: |
          cd build/bin
          ../../script/setup-tpm.sh --start-swtpm --cleanup
      
      - name: Emu_Test
        run: |
          cd build/bin

          ./spdm_responder_emu &
          sleep 5s
          ./spdm_requester_emu > requester.log

          sleep 10s